# Git hooks via lefthook (https://lefthook.dev). Install: `just install-hooks` (runs `lefthook install`).
#
# Hooks shell out to the `just` recipes so lint/test logic has a single source of truth. The gate is
# ENFORCING: `just lint` (fmt-check + clippy-baseline) returns non-zero on any drift, blocking the
# commit/push.
#
# pre-commit alone is not enough: it does NOT run on commits replayed by `git rebase`/`cherry-pick`/
# `--amend`, so unformatted code can reach a branch that way. `pre-push` runs once on the final
# pushed state regardless of how the commits were made, so it catches the rebase path before code
# leaves the machine. The cheap `lint` runs first so a drift failure is near-instant (no waiting on
# the full test suite). Server-side CI (`fmt-check` in `just ci`) is the unbypassable backstop.
#
# Bypass in a genuine emergency only: `git commit --no-verify` / `git push --no-verify`.

pre-commit:
  commands:
    # Auto-format only the staged Rust files (not the whole tree), then re-stage them so the commit
    # is always rustfmt-clean — no "fix it and commit again" round-trip. `stage_fixed` re-adds any
    # file rustfmt rewrote.
    fmt:
      glob: "*.rs"
      run: rustfmt --edition 2021 {staged_files}
      stage_fixed: true
    # clippy stays a check (whole-crate; can't be scoped to single files reliably).
    clippy:
      run: just clippy-baseline-check

pre-push:
  commands:
    # Whole-tree backstop: `just lint` (fmt-check + clippy) re-runs `cargo fmt --all --check`, which
    # catches drift the per-file pre-commit could miss — e.g. a commit replayed by `git rebase`
    # (pre-commit doesn't fire on those) — before code leaves the machine.
    lint:
      priority: 1
      run: just lint
    # Own tests WITH coverage: `coverage-gate` runs the own suite instrumented, which both checks
    # correctness (a failing test fails the run) AND enforces coverage >= the master baseline. No
    # separate plain own-suite run — this one covers both.
    coverage:
      priority: 2
      run: just coverage-gate
    # Conformance WITHOUT coverage: the kotlin box/codegen corpus, plain (instrumenting it would be
    # slow and it's excluded from the coverage metric anyway). Runs after coverage. On a 4-core box
    # the full gate lands around ~3 minutes — the hardware floor for this scope; CI (`just ci`) runs
    # everything across all Kotlin versions as the unbypassable backstop.
    conformance:
      priority: 3
      run: just conformance-plain
