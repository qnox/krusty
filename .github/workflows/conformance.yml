name: conformance

# Recompute the Kotlin box-suite conformance on every master push and publish the README badge —
# WITHOUT committing to the repo. The number is written to a Gist (via dynamic-badges-action); the
# README badge is a shields endpoint pointing at that gist. No bot commits, no history noise.
#
# One-time setup:
#   1. Create a secret Gist with two files: krusty-conformance.json, krusty-kotlin.json.
#   2. Repo secret  GIST_TOKEN          = a PAT with the `gist` scope.
#   3. Repo variable CONFORMANCE_GIST_ID = that gist's id (also replace GIST_ID in README.md).
#   4. Repo variable KRUSTY_BOX_DIR      = path/setup for the codegen/box corpus (see the step below).
# If the gist id or box corpus isn't configured, the job no-ops instead of failing.
on:
  push:
    branches: [master]

# Only reads the repo; the badge is written to a Gist via GIST_TOKEN, not committed here.
permissions:
  contents: read

concurrency:
  group: conformance
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    # Skip entirely until the gist is configured.
    if: ${{ vars.CONFORMANCE_GIST_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
      # Reference kotlinc dist + codegen/box corpus, cached by manifest hash. `just conformance`
      # provisions both on a miss (same recipes as local), so this is "download once, then restore".
      - name: cache kotlin toolchain + box corpus
        uses: actions/cache@v4
        with:
          path: |
            .kotlinc
            .kotlin-box
          key: kotlin-toolchain-${{ hashFiles('kotlin-versions') }}
      - name: compute conformance
        id: c
        run: |
          set -euo pipefail
          read -r pct passed scanned < <(just conformance)
          color=red
          awk "BEGIN{exit !($pct>=10)}" && color=orange || true
          awk "BEGIN{exit !($pct>=40)}" && color=yellow || true
          awk "BEGIN{exit !($pct>=70)}" && color=brightgreen || true
          {
            echo "pct=$pct"; echo "passed=$passed"; echo "scanned=$scanned"
            echo "color=$color"; echo "version=$(just max-version)"
          } >> "$GITHUB_OUTPUT"
      - name: publish conformance badge → gist
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.CONFORMANCE_GIST_ID }}
          filename: krusty-conformance.json
          label: Kotlin ${{ steps.c.outputs.version }} conformance
          message: ${{ steps.c.outputs.pct }}% (${{ steps.c.outputs.passed }}/${{ steps.c.outputs.scanned }})
          color: ${{ steps.c.outputs.color }}
      - name: publish kotlin-version badge → gist
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.CONFORMANCE_GIST_ID }}
          filename: krusty-kotlin.json
          label: Kotlin
          message: ${{ steps.c.outputs.version }}
          color: blue
