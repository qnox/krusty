name: ci

# PR gate (req #4): the whole gate is one command — `just ci` (lint + test-all) — run identically
# locally, in the pre-commit hook, and here. Also runs on master pushes so the default branch never
# goes red unnoticed.
#
# `just test-all` fans the suite across every supported Kotlin reference version IN PARALLEL itself
# (one CARGO_TARGET_DIR per version) — no GitHub-Actions matrix needed, so local and CI parallelism
# are the same code. Provision kotlinc and export KRUSTY_KOTLINC (or KRUSTY_KOTLINC_<ver>) to enable
# the differential harness; kotlinc-gated tests skip otherwise.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25' # krusty's reference toolchain is Java 25; JVM-run e2e tests need it
      # Reference kotlinc dist (differential harness + box-suite stdlib). Cached by manifest hash so
      # it's downloaded once per version, then restored. KRUSTY_KOTLINC enables the gated tests.
      - name: cache reference kotlinc
        uses: actions/cache@v4
        with:
          path: .kotlinc
          key: kotlinc-${{ hashFiles('kotlin-versions') }}
      - name: provision reference kotlinc
        run: echo "KRUSTY_KOTLINC=$(just kotlinc)" >> "$GITHUB_ENV"
      - name: just ci
        run: just ci
