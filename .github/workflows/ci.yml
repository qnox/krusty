name: ci

# PR gate (req #4): the whole gate is one command — `just ci` (lint + test-all) — run identically
# locally, in the pre-commit hook, and here. Also runs on master pushes so the default branch never
# goes red unnoticed.
#
# `just test-all` fans the suite across every supported Kotlin reference version IN PARALLEL itself
# (one CARGO_TARGET_DIR per version) — no GitHub-Actions matrix needed, so local and CI parallelism
# are the same code. Provision kotlinc and export KRUSTY_KOTLINC (or KRUSTY_KOTLINC_<ver>) to enable
# the differential harness; kotlinc-gated tests skip otherwise.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25' # krusty's reference toolchain is Java 25; JVM-run e2e tests need it
      # Cache the reference kotlinc dist + the codegen/box corpus, keyed by manifest hash. `just ci`
      # (-> test-all) provisions both per supported version on a miss, so the differential + the
      # conformance gates actually run (they FAIL, not skip, without these).
      - name: cache kotlin toolchain + box corpus
        uses: actions/cache@v6
        with:
          path: |
            .kotlinc
            .kotlin-box
          key: kotlin-toolchain-${{ hashFiles('kotlin-versions') }}
      - name: just ci
        run: just ci
